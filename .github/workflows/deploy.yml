name: Deploy Agendoro Frontend

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: agendoro-frontend-production
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      packages: write

    env:
      FRONTEND_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/agendoro-frontend
      TZ: America/Sao_Paulo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Frontend dependencies
        working-directory: .
        run: npm ci

      - name: Test Frontend
        working-directory: .
        run: npm test -- --run

      - name: Build Frontend
        working-directory: .
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_WHATSAPP_LINK: ${{ secrets.VITE_WHATSAPP_LINK }}

      - name: Metadata da imagem Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build e push da imagem Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_WHATSAPP_LINK=${{ secrets.VITE_WHATSAPP_LINK }}

  deploy:
    runs-on: ubuntu-latest
    environment: production
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean up existing deploy files on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /opt/agendoro-frontend
            rm -f /opt/agendoro-frontend/docker-compose.prod.yml
            rm -f /opt/agendoro-frontend/deploy.sh

      - name: Copy compose and deploy script to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/docker-compose.prod.yml,deploy/deploy.sh"
          target: "/opt/agendoro-frontend"
          strip_components: 1

      - name: Executar deploy remoto
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USERNAME: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            mkdir -p /opt/agendoro-frontend
            chmod +x /opt/agendoro-frontend/deploy.sh
            cd /opt/agendoro-frontend
            /opt/agendoro-frontend/deploy.sh
